name: Publish to npm

# Publishes @brijeshc2049/quiver to npm automatically.
# It runs on every push to main, but only actually publishes when the version
# in package.json is one that is not already on the registry. That makes the
# workflow safe to run on every commit: docs-only or code-only commits are
# no-ops, and a real release is just a version bump in package.json.

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'bin/**'
      - 'skills/**'
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
  workflow_dispatch: {}

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Read package name and version
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already published
        id: check
        run: |
          NAME="${{ steps.pkg.outputs.name }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already published: $NAME@$VERSION"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "new version to publish: $NAME@$VERSION"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.should_publish }}" = "true" ]; then
            echo "Published ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} to npm." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No publish: ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already on npm. Bump the version in package.json to release." >> "$GITHUB_STEP_SUMMARY"
          fi
