name: Publish to npm

# Publishes @brijeshc2049/quiver to the public npm registry automatically.
#
# Auth: npm Trusted Publishing via OIDC - there is NO stored NPM_TOKEN secret.
# The runner mints a short-lived token bound to this repo + workflow, so nothing
# publishable can be stolen from repo secrets. Requires a one-time "Trusted
# Publisher" config on npmjs.com (see docs/RELEASING.md) and `id-token: write`.
#
# Trigger: every push to main, but it only publishes when the version in
# package.json is not already on the registry. Ordinary commits are no-ops;
# a release is simply a commit that bumps the version.

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'bin/**'
      - 'skills/**'
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
  workflow_dispatch: {}

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # required for OIDC Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing and --provenance require a recent npm (>= 11.5.1).
      - name: Update npm
        run: npm install -g npm@latest

      - name: Read package name and version
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already published
        id: check
        run: |
          NAME="${{ steps.pkg.outputs.name }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already published: $NAME@$VERSION"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "new version to publish: $NAME@$VERSION"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      # No NODE_AUTH_TOKEN: auth comes from the OIDC identity via id-token: write.
      - name: Publish
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --access public --provenance

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.should_publish }}" = "true" ]; then
            echo "Published ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} to npm (with provenance)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No publish: ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already on npm. Bump the version in package.json to release." >> "$GITHUB_STEP_SUMMARY"
          fi
